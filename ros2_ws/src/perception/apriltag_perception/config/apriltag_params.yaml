apriltag_perception_node:
  ros__parameters:
    input_image_topic: /camera/device
    output_topic: /perception/apriltag_detections/device
    frame_id: device
    publish_rate_hz: 10.0
    tag_family: tag36h11
    tag_size_m: 0.16
    hamming_max: 2
    camera_fx: 0.0
    camera_fy: 0.0
    camera_cx: 0.0
    camera_cy: 0.0
